# =====================================================
# Resource bundle for the Invoice Management application
# =====================================================

# --- manifest.json -----------------------------------
# XTIT: Application title in the launchpad tile
appTitle=Rechnungsmanagement
# YDES: Application description in the launchpad tile
appDescription=Verwaltung und Übersicht aller Eingangsrechnungen.

# --- Worklist (Invoice list) -------------------------
# XTIT: Title of the worklist page
worklistTitle=Rechnungen
# XMSG: Subtitle / explanatory text on the worklist page
worklistSubtitle=Übersicht aller Eingangsrechnungen mit Status, Lieferant und Beträgen.
# XTIT: Toolbar title above the table when no count is available yet
worklistTableTitle=Rechnungen
# XTIT: Toolbar title above the table including the result count, e.g. "Rechnungen (12)"
worklistTableTitleCount=Rechnungen ({0})
# XFLD: Unit label shown next to the result count when the page header is snapped
worklistResultsLabel=Treffer

# --- Filter labels -----------------------------------
filterStatus=Status
filterVendor=Lieferant
filterVendorPlaceholder=Lieferantenname eingeben
filterInvoiceDate=Rechnungsdatum
filterDateRangePlaceholder=Zeitraum auswählen
filterCurrency=Währung
filterCurrencyAll=Alle
filterAmountFrom=Bruttobetrag von
filterAmountTo=Bruttobetrag bis

# --- Status values -----------------------------------
statusFilterAll=Alle
statusDraft=Entwurf
statusPosted=Gebucht

# --- Table columns -----------------------------------
colInvoiceNumber=Rechnungsnummer
colVendor=Lieferant
colInvoiceDate=Rechnungsdatum
colGrossAmount=Bruttobetrag
colStatus=Status

# --- Table generic -----------------------------------
tableNoData=Keine Rechnungen für die aktuellen Filter gefunden.

# --- Search ------------------------------------------
searchPlaceholder=Suche nach Rechnungsnr., Lieferant oder Referenz

# --- Actions / buttons -------------------------------
actionRefresh=Aktualisieren
actionSort=Sortierung umkehren
actionClearFilters=Filter zurücksetzen
actionBack=Zurück
actionBackToList=Zur Rechnungsübersicht

# --- Messages ----------------------------------------
messageRefreshed=Daten wurden aktualisiert.
messageFiltersCleared=Alle Filter wurden zurückgesetzt.
messageSortAsc=Sortierung: älteste Rechnung zuerst.
messageSortDesc=Sortierung: neueste Rechnung zuerst.

# --- Object page -------------------------------------
# XTIT: Section heading – general invoice information
objectSectionGeneral=Allgemein
# XTIT: Section heading – relevant dates of the invoice
objectSectionDates=Termine
# XTIT: Section heading – monetary information
objectSectionAmounts=Beträge

# --- Object page field labels ------------------------
objectFieldInvoiceNumber=Rechnungsnummer
objectFieldReference=Referenz
objectFieldVendor=Lieferant
objectFieldVendorId=Lieferantennummer
objectFieldCompanyCode=Buchungskreis
objectFieldPaymentTerms=Zahlungsbedingungen
objectFieldCreatedBy=Erfasser
objectFieldInvoiceDate=Rechnungsdatum
objectFieldDueDate=Fälligkeitsdatum
objectFieldPostingDate=Buchungsdatum
objectFieldNetAmount=Nettobetrag
objectFieldTaxAmount=Steuerbetrag
objectFieldGrossAmount=Bruttobetrag
objectFieldCurrency=Währung
objectFieldStatus=Status

# --- NotFound page -----------------------------------
notFoundTitle=Seite nicht gefunden
notFoundDescription=Die aufgerufene Seite konnte nicht gefunden werden. Sie wurden zur Übersicht zurückgeleitet.
